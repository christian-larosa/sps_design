table:
  name: sps_score_tableau
  description: "Main Supplier Performance Scorecard table (v7-NEW) - final aggregated metrics with all_keys UNION architecture and debug/Tableau ingredientes"
  clustering_key:
    - global_entity_id

columns:
  # ============================================================
  # AGGREGATION KEYS (from all_keys UNION)
  # ============================================================
  - name: global_entity_id
    type: STRING
    nullable: false

  - name: time_period
    type: STRING
    nullable: false

  - name: brand_sup
    type: STRING
    nullable: false

  - name: entity_key
    type: STRING
    nullable: false

  - name: division_type
    type: STRING
    nullable: false

  - name: supplier_level
    type: STRING
    nullable: false

  - name: time_granularity
    type: STRING
    nullable: false

  # ============================================================
  # PRICE INDEX METRICS (from sps_price_index)
  # ============================================================
  - name: median_price_index
    type: FLOAT
    nullable: true
    source: sps_price_index
    note: "Deprecated in Tableau v7; use price_index_numerator/price_index_weight instead"

  - name: price_index_numerator
    type: FLOAT
    nullable: true
    source: sps_price_index
    description: "NEW: Numerator for weighted price index. Tableau: SUM(price_index_numerator) / SUM(price_index_weight)"
    is_ingredient: true

  - name: price_index_weight
    type: FLOAT
    nullable: true
    source: sps_price_index
    description: "NEW: Weight for price index (GPV-based). Use as denominator in Tableau"
    is_ingredient: true

  # ============================================================
  # DAYS PAYABLE METRICS (from sps_days_payable)
  # ============================================================
  - name: payment_days
    type: INTEGER
    nullable: true
    source: sps_days_payable

  - name: doh
    type: FLOAT
    nullable: true
    source: sps_days_payable
    description: "Days on Hand (deprecated). Use stock_value_eur/cogs_monthly_eur for calculation"
    note: "Deprecated in Tableau v7"

  - name: dpo
    type: FLOAT
    nullable: true
    source: sps_days_payable
    description: "Days Payable Outstanding (deprecated). Use payment_days - calculated_doh"
    note: "Deprecated in Tableau v7"

  - name: stock_value_eur
    type: FLOAT
    nullable: true
    source: sps_days_payable
    description: "NEW: Stock value in EUR. Ingredient for DOH calculation"
    is_ingredient: true

  - name: cogs_monthly_eur
    type: NUMERIC
    nullable: true
    source: sps_days_payable
    description: "NEW: Monthly COGS in EUR. Ingredient for DOH calculation"
    is_ingredient: true

  - name: days_in_month
    type: INTEGER
    nullable: true
    source: sps_days_payable
    description: "NEW: Days in month. Ingredient for monthly DOH calculation"
    is_ingredient: true

  - name: days_in_quarter
    type: INTEGER
    nullable: true
    source: sps_days_payable
    description: "NEW: Days in quarter. Ingredient for quarterly DOH calculation"
    is_ingredient: true

  # ============================================================
  # FINANCIAL METRICS (from sps_financial_metrics)
  # ============================================================
  - name: total_customers
    type: INTEGER
    nullable: true
    source: sps_financial_metrics

  - name: total_skus_sold
    type: INTEGER
    nullable: true
    source: sps_financial_metrics

  - name: total_orders
    type: INTEGER
    nullable: true
    source: sps_financial_metrics

  - name: total_warehouses_sold
    type: INTEGER
    nullable: true
    source: sps_financial_metrics

  - name: Total_Net_Sales_eur_order
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics
    currency: EUR

  - name: Net_Sales_eur
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics
    currency: EUR

  - name: COGS_eur
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics
    currency: EUR

  - name: Net_Sales_from_promo_eur
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics
    currency: EUR

  - name: total_supplier_funding_eur
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics
    currency: EUR

  - name: front_margin_amt_eur
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics
    currency: EUR

  - name: total_discount_eur
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics
    currency: EUR

  - name: Promo_GPV_contribution_eur
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics

  - name: Total_Net_Sales_lc_order
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics
    currency: LC

  - name: Net_Sales_lc
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics
    currency: LC

  - name: COGS_lc
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics
    currency: LC

  - name: Net_Sales_from_promo_lc
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics
    currency: LC

  - name: total_supplier_funding_lc
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics
    currency: LC

  - name: front_margin_amt_lc
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics
    currency: LC

  - name: total_discount_lc
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics
    currency: LC

  - name: Promo_GPV_contribution_lc
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics

  - name: total_GBV
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics
    currency: EUR

  - name: fulfilled_quantity
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics

  - name: Net_Sales_eur_Last_Year
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics
    currency: EUR

  - name: Net_Sales_lc_Last_Year
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics
    currency: LC

  - name: YoY_GPV_Growth_eur
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics

  - name: YoY_GPV_Growth_lc
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics

  - name: back_margin_amt_lc
    type: FLOAT
    nullable: true
    source: sps_financial_metrics
    currency: LC

  - name: back_margin_wo_dist_allowance_amt_lc
    type: FLOAT
    nullable: true
    source: sps_financial_metrics
    currency: LC

  - name: Total_Margin_LC
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics

  - name: Front_Margin_eur
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics

  - name: Front_Margin_lc
    type: NUMERIC
    nullable: true
    source: sps_financial_metrics

  # ============================================================
  # LINE REBATE METRICS (from sps_line_rebate_metrics)
  # ============================================================
  - name: total_rebate
    type: FLOAT
    nullable: true
    source: sps_line_rebate_metrics

  - name: total_rebate_wo_dist_allowance_lc
    type: FLOAT
    nullable: true
    source: sps_line_rebate_metrics

  - name: calc_gross_delivered
    type: FLOAT
    nullable: true
    source: sps_line_rebate_metrics
    description: "NEW: Gross delivered quantity ingredient"
    is_ingredient: true

  - name: calc_gross_return
    type: FLOAT
    nullable: true
    source: sps_line_rebate_metrics
    description: "NEW: Gross return quantity ingredient"
    is_ingredient: true

  - name: calc_net_delivered
    type: FLOAT
    nullable: true
    source: sps_line_rebate_metrics
    description: "NEW: Net delivered quantity ingredient"
    is_ingredient: true

  - name: calc_net_return
    type: FLOAT
    nullable: true
    source: sps_line_rebate_metrics
    description: "NEW: Net return quantity ingredient"
    is_ingredient: true

  # ============================================================
  # EFFICIENCY METRICS (from sps_efficiency)
  # ============================================================
  - name: sku_listed
    type: INTEGER
    nullable: true
    source: sps_efficiency

  - name: sku_mature
    type: INTEGER
    nullable: true
    source: sps_efficiency

  - name: sku_new
    type: INTEGER
    nullable: true
    source: sps_efficiency

  - name: sku_probation
    type: INTEGER
    nullable: true
    source: sps_efficiency

  - name: efficient_movers
    type: INTEGER
    nullable: true
    source: sps_efficiency

  - name: numerator_new_avail
    type: FLOAT
    nullable: true
    source: sps_efficiency
    description: "NEW: Availability metric numerator (AQS v7). Tableau: SUM(numerator_new_avail) / SUM(denom_new_avail)"
    is_ingredient: true

  - name: denom_new_avail
    type: FLOAT
    nullable: true
    source: sps_efficiency
    description: "NEW: Availability metric denominator (AQS v7)"
    is_ingredient: true

  - name: weight_efficiency
    type: FLOAT
    nullable: true
    source: sps_efficiency
    description: "NEW: Weighted efficiency (AQS v7). Tableau: SUM(weight_efficiency) / SUM(gpv_eur)"
    is_ingredient: true

  - name: gpv_eur
    type: FLOAT
    nullable: true
    source: sps_efficiency
    currency: EUR

  # ============================================================
  # LISTED SKU METRICS (from sps_listed_sku)
  # ============================================================
  - name: listed_skus
    type: INTEGER
    nullable: true
    source: sps_listed_sku

  - name: listed_skus_efficiency
    type: INTEGER
    nullable: true
    source: sps_listed_sku
    description: "NEW: Listed SKUs count from efficiency table (may differ from listed_skus)"

  # ============================================================
  # SHRINKAGE METRICS (from sps_shrinkage)
  # ============================================================
  - name: spoilage_value_eur
    type: FLOAT
    nullable: true
    source: sps_shrinkage
    currency: EUR

  - name: spoilage_value_lc
    type: NUMERIC
    nullable: true
    source: sps_shrinkage
    currency: LC
    description: "NEW: Multi-currency support"

  - name: retail_revenue_eur
    type: FLOAT
    nullable: true
    source: sps_shrinkage
    currency: EUR

  - name: retail_revenue_lc
    type: FLOAT
    nullable: true
    source: sps_shrinkage
    currency: LC
    description: "NEW: Multi-currency support"

  - name: spoilage_rate
    type: FLOAT
    nullable: true
    source: sps_shrinkage
    description: "Tableau: SUM(spoilage_value_eur) / SUM(retail_revenue_eur)"

  # ============================================================
  # DELIVERY COSTS (from sps_delivery_costs)
  # ============================================================
  - name: delivery_cost_eur
    type: FLOAT
    nullable: true
    source: sps_delivery_costs
    currency: EUR

  - name: delivery_cost_local
    type: FLOAT
    nullable: true
    source: sps_delivery_costs
    currency: LC

  # ============================================================
  # PURCHASE ORDER METRICS (from sps_purchase_order)
  # ============================================================
  - name: on_time_orders
    type: INTEGER
    nullable: true
    source: sps_purchase_order

  - name: total_received_qty_per_po_order
    type: INTEGER
    nullable: true
    source: sps_purchase_order

  - name: total_demanded_qty_per_po_order
    type: INTEGER
    nullable: true
    source: sps_purchase_order

  - name: total_cancelled_po_orders
    type: INTEGER
    nullable: true
    source: sps_purchase_order

  - name: total_non_cancelled__po_orders
    type: INTEGER
    nullable: true
    source: sps_purchase_order

  - name: fill_rate
    type: FLOAT
    nullable: true
    source: sps_purchase_order

  - name: otd
    type: FLOAT
    nullable: true
    source: sps_purchase_order
    description: "On-Time Delivery"

  - name: supplier_non_fulfilled_order_qty
    type: INTEGER
    nullable: true
    source: sps_purchase_order

  - name: total_po_orders
    type: INTEGER
    nullable: true
    source: sps_purchase_order
    description: "NEW (debug): Total POs without filters"
    is_debug: true

  - name: total_compliant_po_orders
    type: INTEGER
    nullable: true
    source: sps_purchase_order
    description: "NEW (debug): Total compliant POs"
    is_debug: true

  - name: total_received_qty_ALL
    type: INTEGER
    nullable: true
    source: sps_purchase_order
    description: "NEW (debug): Received qty across ALL orders"
    is_debug: true

  - name: total_demanded_qty_ALL
    type: INTEGER
    nullable: true
    source: sps_purchase_order
    description: "NEW (debug): Demanded qty across ALL orders"
    is_debug: true

metadata:
  total_columns: 84

  source_tables:
    - all_keys (UNION DISTINCT of 9 tables)
    - sps_purchase_order
    - sps_financial_metrics
    - sps_line_rebate_metrics
    - sps_price_index
    - sps_days_payable
    - sps_efficiency
    - sps_listed_sku
    - sps_shrinkage
    - sps_delivery_costs

  aggregation_keys: [global_entity_id, time_period, brand_sup, entity_key, division_type, supplier_level, time_granularity]

  lookback_period: "Last 4 quarters (1 year)"

  update_frequency: "Incremental refresh"

  clustering: "global_entity_id"

  key_features:
    - "all_keys UNION DISTINCT architecture ensures coverage of all unique key combinations across 9 source tables"
    - "Ingredientes for Tableau aggregation (price_index, DOH, availability, weight_efficiency)"
    - "Multi-currency support (EUR + LC)"
    - "Debug fields for order aggregation validation"
    - "AQS v7 efficiency methodology"

  deprecated_fields:
    - "median_price_index: use price_index_numerator/price_index_weight"
    - "doh, dpo: use ingredients (stock_value_eur, cogs_monthly_eur, days_in_month/quarter)"
